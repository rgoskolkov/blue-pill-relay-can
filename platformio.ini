[env:bluepill_f103c8]
platform = ststm32
board = bluepill_f103c8
framework = stm32cube
board_build.ldscript = src/cubemx/STM32F103XX_FLASH.ld
board_build.stm32cube.custom_system_setup = yes
lib_compat_mode = off
lib_archive = no
;build_type = debug
;upload_flags = -c set CPUTAPID 0x2ba01477
build_flags =
  ;   -DportREMOVE_STATIC_QUALIFIER
  -I./src/cubemx/inc
;  -D UART_DEBUG=1
;  -D MONITOR_TASK=1
;     -Wl,--undefined=uxTopUsedPriority
;     -D FREERTOS
;     -D FREERTOS_USE_TRACE_FACILITY=1
;     -ffunction-sections
;     -fdata-sections
;     -fno-omit-frame-pointer
;     ${env.build_flags}
debug_build_flags =
    ${env.build_flags}
    -D DEBUG
    -O0
    -g3
    -ggdb3
    -D FREERTOS
    -D FREERTOS_USE_TRACE_FACILITY=1
monitor_speed = 115200
debug_tool = stlink
debug_svd_path = ${platformio.platforms_dir}/ststm32/misc/svd/STM32F103xx.svd
debug_server =
  openocd
  -f interface/stlink.cfg
  ;-f target/stm32f1x.cfg
  -f /Users/romanoskolkov/Desktop/stm32f1x.cfg
  -c "reset_config srst_nogate"
debug_speed = 1000
