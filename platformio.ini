[env:bluepill_f103c8]
platform = ststm32
board = bluepill_f103c8
framework = stm32cube
build_flags = 
    -D MODBUS_ENABLED
    -D RELAY_COUNT=8
    -D SWITCH_COUNT=8
monitor_speed = 115200
upload_protocol = stlink
; board_build.stm32cube.custom_system_setup = yes
; board_build.stm32cube.system_file = system_stm32f1xx.c
debug_tool = stlink
upload_flags = -c set CPUTAPID 0x2ba01477
debug_server = 
	openocd
	-s /usr/share/openocd/scripts
	-f interface/stlink.cfg
	-c "transport select hla_swd"
	-c "set CPUTAPID 0x2ba01477"
	-f target/stm32f1x.cfg
	-c "reset_config none"
board_debug.openocd_extra_args = 
	-c "set CPUTAPID 0x2ba01477"
; lib_deps =
;   https://github.com/feaser/microtbx-modbus.git#v1.0.0
;   https://github.com/feaser/microtbx.git#v1.4.0      