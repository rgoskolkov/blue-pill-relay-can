[env:bluepill_f103c8]
platform = ststm32
board = bluepill_f103c8
framework = stm32cube
lib_compat_mode = off
build_flags =
	-I./src/cubemx/inc
	-I./src/freertos/include
	-I./src/freertos/portable/GCC/ARM_CM3
	-I./src/freertos/CMSIS_RTOS_V2
  -I .pio/libdeps/bluepill_f103c8/Modbus-STM32-HAL-FreeRTOS/Inc
  	; -D USE_ITM
  	; -Wl,-Map=firmware.map
  	 ; -D USE_HAL_DRIVER
  	 ; -D STM32F103xB
  	 -D FREERTOS
monitor_speed = 115200
debug_tool = stlink

