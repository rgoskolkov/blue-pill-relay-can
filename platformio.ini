[env:bluepill_f103c8]
platform = ststm32
board = bluepill_f103c8
framework = stm32cube
;upload_protocol = dfu
;build_type = debug
;upload_flags = -c set CPUTAPID 0x2ba01477
build_flags =
  -I./src/cubemx/inc
  ;-D MONITOR_TASK=1
  -D HEARTBEAT_TIME_MS=10000
  -D NUM_SWITCHES=12
  -D SWITCH_9_RELAY=8
  -D SWITCH_10_RELAY=7
  -D SWITCH_11_RELAY=6
  -D SWITCH_12_RELAY=8
  ; =================================================================================
  ; Switch-to-Relay Mapping Configuration
  ; =================================================================================
  ; Каждая директива -D SWITCH_X_RELAY=Y задает, что выключатель X управляет реле Y.
  ; Номера выключателей и реле - 1-based.
  ;
  ; -D SWITCH_1_RELAY=1  ; Выключатель 1 -> Реле 1
  ; -D SWITCH_2_RELAY=2  ; Выключатель 2 -> Реле 2
  ; ...
  ; -D SWITCH_9_RELAY=1  ; Выключатель 9 -> Реле 1 (пример для дополнительного выключателя)
  ;
  ; По умолчанию (если не задано), для выключателей 1-8 используется маппинг 1-в-1.
  ; Для дополнительных выключателей (9 и далее) маппинг ДОЛЖЕН быть задан явно.
  ; =================================================================================
debug_build_flags =
    ${env.build_flags}
    -D DEBUG
    -O0
    -g3
    -ggdb3
    -D FREERTOS
    -D FREERTOS_USE_TRACE_FACILITY=1
monitor_speed = 115200
debug_tool = stlink
debug_speed = 1000