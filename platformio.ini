[env:bluepill_f103c8]
platform = ststm32
board = bluepill_f103c8
framework = stm32cube
build_flags = 
    -D MODBUS_ENABLED
    -D RELAY_COUNT=8
    -D SWITCH_COUNT=8
    ; -I .pio/libdeps/bluepill_f103c8/microtbx-modbus/source
    ; -I .pio/libdeps/bluepill_f103c8/microtbx-modbus/source/template
    ; -I .pio/libdeps/bluepill_f103c8/microtbx/source/template
    ; -I .pio/libdeps/bluepill_f103c8/microtbx/source/
    ; -I .pio/libdeps/bluepill_f103c8/microtbx/source/port/ARM_CORTEXM
monitor_speed = 115200
upload_protocol = stlink
upload_port = /dev/ttyUSB0
debug_tool = stlink
board_build.stm32cube.custom_system_setup = yes
board_build.stm32cube.system_file = system_stm32f1xx.c
; lib_deps =
;   https://github.com/feaser/microtbx-modbus.git#v1.0.0
;   https://github.com/feaser/microtbx.git#v1.4.0      